<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- CSP: popup の inline スクリプトは使わず popup.js を読み込む（XSS 面を狭める）。 -->
    <title>nonbiri-bird の設定</title>
    <style>
      :root {
        --bg: #f7f3ea;
        --ink: #3b3026;
        --accent: #6fae6f;
        --line: #d8d0bf;
      }
      body {
        width: 260px;
        margin: 0;
        padding: 14px 16px;
        font-family: system-ui, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--bg);
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .row {
        margin: 12px 0;
      }
      label {
        font-size: 12px;
        display: block;
        margin-bottom: 4px;
      }
      .between {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      input[type="range"] {
        width: 100%;
      }
      .seg {
        display: flex;
        gap: 4px;
      }
      .seg label {
        flex: 1;
        text-align: center;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 5px 0;
        cursor: pointer;
        margin: 0;
        background: #fff;
      }
      .seg input {
        display: none;
      }
      .seg input:checked + span {
        font-weight: bold;
      }
      .seg label:has(input:checked) {
        border-color: var(--accent);
        background: #eef6ee;
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        height: 56px;
        resize: vertical;
        font-size: 11px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 5px;
      }
      button {
        font-size: 11px;
        padding: 5px 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      .hint {
        font-size: 10px;
        color: #8a8170;
        margin-top: 4px;
      }
      hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 12px 0;
      }
      /* スイッチ風トグル */
      .switch {
        position: relative;
        width: 40px;
        height: 22px;
      }
      .switch input {
        display: none;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #ccc;
        border-radius: 22px;
        transition: 0.2s;
      }
      .slider::before {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        left: 2px;
        top: 2px;
        background: #fff;
        border-radius: 50%;
        transition: 0.2s;
      }
      .switch input:checked + .slider {
        background: var(--accent);
      }
      .switch input:checked + .slider::before {
        transform: translateX(18px);
      }
    </style>
  </head>
  <body>
    <h1>🐦 nonbiri-bird</h1>

    <div class="row between">
      <label for="enabled" style="margin: 0">鳥を飛ばす</label>
      <span class="switch">
        <input type="checkbox" id="enabled" />
        <span class="slider"></span>
      </span>
    </div>

    <hr />

    <div class="row">
      <label
        >羽数の上限: <strong id="maxBirdsLabel">3</strong> 羽</label
      >
      <input type="range" id="maxBirds" min="1" max="5" step="1" />
    </div>

    <div class="row">
      <label>飛ぶ頻度</label>
      <div class="seg" id="frequency">
        <label><input type="radio" name="freq" value="low" /><span>低</span></label>
        <label><input type="radio" name="freq" value="mid" /><span>中</span></label>
        <label><input type="radio" name="freq" value="high" /><span>高</span></label>
      </div>
    </div>

    <hr />

    <div class="row">
      <div class="between">
        <label style="margin: 0">このサイトでは飛ばさない</label>
        <button id="excludeCurrent" type="button">今のサイトを追加</button>
      </div>
      <textarea
        id="excludedSites"
        placeholder="除外したいホスト名を1行に1つ（例: example.com）"
      ></textarea>
      <div class="hint">サブドメインも一緒に除外されるのだ（foo.example.com も対象）。</div>
    </div>

    <hr />
    <div class="hint">種類: ノーマル（現在1種。種類追加は今後対応）</div>

    <!-- logic.js を先に読み、設定スキーマ(DEFAULTS/MAX_BIRDS)を content.js と共有する。 -->
    <script src="src/logic.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
